<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게스트스냅 모아보기</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF7;--ink:#191919;--sub:#97928A;--line:#E7E4DE;--soft:#F2F0EB;--accent:#A79877}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}
.container{max-width:960px;margin:0 auto;padding:50px 20px 90px}
h1{font-family:'Cormorant Garamond',serif;font-size:34px;text-align:center;letter-spacing:2px;font-weight:500}
.sub{text-align:center;color:var(--sub);font-size:13px;margin:6px 0 34px}
.toolbar{display:flex;justify-content:center;gap:10px;margin-bottom:34px;flex-wrap:wrap}
.btn{padding:12px 26px;border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:2px;font-family:inherit;font-size:13px;letter-spacing:2px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink)}
.btn:disabled{opacity:.5;cursor:default}
.status{text-align:center;font-size:12.5px;color:var(--accent);min-height:20px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.cell{position:relative;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:#fff}
.cell img{width:100%;aspect-ratio:1;object-fit:cover;display:block;cursor:pointer}
.cell .meta{font-size:10.5px;color:var(--sub);padding:6px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell a.dl{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink);font-size:14px}
.cell button.del{position:absolute;top:6px;left:6px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#B0443C;font-size:13px;cursor:pointer}
.empty{text-align:center;color:var(--sub);padding:80px 0;font-size:14px}
.msg-sec{margin-top:70px}
h2{font-family:'Cormorant Garamond',serif;font-size:24px;text-align:center;letter-spacing:2px;font-weight:500;margin-bottom:20px}
.msg{background:#fff;border:1px solid var(--line);border-radius:4px;padding:14px 18px;margin-bottom:10px;max-width:560px;margin-left:auto;margin-right:auto}
.msg .head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.msg .name{font-weight:700}
.msg .date{color:#C4BFB6}
.msg p{font-size:13.5px;font-weight:300}
#viewer{position:fixed;inset:0;background:rgba(15,15,14,.96);display:none;justify-content:center;align-items:center;z-index:100}
#viewer.open{display:flex}
#viewer img{max-width:94%;max-height:88vh;border-radius:2px}
#viewer .x{position:absolute;top:18px;right:22px;color:#fff;font-size:28px;background:none;border:none;cursor:pointer}
table.rv{width:100%;max-width:640px;margin:0 auto;border-collapse:collapse;font-size:12.5px;background:#fff}
.rv th,.rv td{border:1px solid var(--line);padding:8px 10px;text-align:center}
.rv th{background:var(--soft);font-weight:700}
</style>
</head>
<body>
<div class="container">
  <h1>Guest Moments</h1>
  <p class="sub">하객분들이 남겨주신 사진과 메시지</p>
  <div class="toolbar">
    <button class="btn" id="zipBtn" onclick="downloadAll()">전체 사진 ZIP 다운로드</button>
    <button class="btn ghost" onclick="location.reload()">새로고침</button>
  </div>
  <p class="status" id="status"></p>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">아직 올라온 사진이 없어요.</div>

  <div class="msg-sec">
    <h2>R.S.V.P</h2>
    <p class="status" id="rv-sum"></p>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn" onclick="downloadRsvp()">엑셀(.xlsx)로 내려받기</button>
    </div>
    <div id="rv-list"></div>
  </div>

  <div class="msg-sec">
    <h2>Messages</h2>
    <div id="msgs"></div>
  </div>
</div>

<div id="viewer" onclick="this.classList.remove('open')">
  <button class="x">✕</button>
  <img id="viewer-img" alt="사진 크게 보기">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL = 'https://xfgmxlfpcdhzghuzubog.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HYipdtwD67ZbKrl_Lziiow_Z0gHm6HZ';
const SB_BUCKET = 'guest-snaps';
const H = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };
const PUB = SUPABASE_URL + '/storage/v1/object/public/' + SB_BUCKET + '/';
let files = [];

function esc(s){ const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// 파일명에 base64url로 인코딩된 업로더 이름 복원
function uploaderOf(fname){
  try{
    if(fname[0] !== 'n') return '게스트';
    let seg = fname.slice(1).split('.')[0].replace(/-/g,'+').replace(/_/g,'/');
    seg += '='.repeat((4 - seg.length % 4) % 4);
    return decodeURIComponent(escape(atob(seg))) || '게스트';
  }catch(e){ return '게스트'; }
}

async function listFiles(){
  const res = await fetch(SUPABASE_URL + '/storage/v1/object/list/guest-snaps', {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json' }, H),
    body: JSON.stringify({ prefix: '', limit: 1000, sortBy: { column: 'created_at', order: 'desc' } })
  });
  const rows = await res.json();
  return (rows || []).filter(r => r.name && r.id);
}

async function load(){
  const grid = document.getElementById('grid');
  try{
    files = await listFiles();
  }catch(e){
    document.getElementById('status').textContent = '목록을 불러오지 못했어요. 새로고침 해주세요.';
    return;
  }
  document.getElementById('empty').style.display = files.length ? 'none' : 'block';
  document.getElementById('status').textContent = files.length ? '총 ' + files.length + '장' : '';
  grid.innerHTML = files.map(f => {
    const url = PUB + encodeURIComponent(f.name);
    const who = uploaderOf(f.name);
    return '<div class="cell">'
      + '<img loading="lazy" src="' + url + '" onclick="openViewer(\'' + url + '\')" alt="">'
      + '<a class="dl" href="' + url + '?download" download="' + esc(f.name) + '" title="다운로드">⤓</a>'
      + '<button class="del" onclick="delPhoto(\'' + encodeURIComponent(f.name) + '\', \'' + esc(who) + '\')" title="삭제">✕</button>'
      + '<div class="meta">' + esc(who) + '</div>'
      + '</div>';
  }).join('');
}

async function delPhoto(encName, who){
  const fname = decodeURIComponent(encName);
  if(!confirm(who + ' 님이 올린 사진을 삭제할까요?\n삭제하면 되돌릴 수 없어요.')) return;
  const r = await fetch(SUPABASE_URL + '/storage/v1/object/' + SB_BUCKET + '/' + encName,
    { method: 'DELETE', headers: H });
  if(r.ok){ load(); }
  else{ alert('삭제에 실패했어요. 잠시 후 다시 시도해주세요.'); }
}

function openViewer(url){
  document.getElementById('viewer-img').src = url;
  document.getElementById('viewer').classList.add('open');
}

async function downloadAll(){
  if(!files.length){ alert('다운로드할 사진이 없어요.'); return; }
  const btn = document.getElementById('zipBtn'), st = document.getElementById('status');
  btn.disabled = true;
  const zip = new JSZip();
  let done = 0;
  for(const f of files){
    try{
      const blob = await fetch(PUB + encodeURIComponent(f.name)).then(r => r.blob());
      zip.file(f.name, blob);
    }catch(e){ /* skip failed file */ }
    done++;
    st.textContent = '내려받는 중... ' + done + ' / ' + files.length;
  }
  st.textContent = 'ZIP 파일 만드는 중...';
  const out = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(out);
  a.download = 'guest-snaps-' + new Date().toISOString().slice(0,10) + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
  st.textContent = '완료! 총 ' + files.length + '장';
  btn.disabled = false;
}

async function loadMsgs(){
  try{
    const rows = await fetch(SUPABASE_URL + '/rest/v1/guestbook?select=name,msg,created_at&order=created_at.desc&limit=500',
      { headers: H }).then(r => r.json());
    document.getElementById('msgs').innerHTML = (rows || []).map(r =>
      '<div class="msg"><div class="head"><span class="name">' + esc(r.name)
      + '</span><span class="date">' + (r.created_at || '').slice(0,10).replace(/-/g,'.')
      + '</span></div><p>' + esc(r.msg) + '</p></div>'
    ).join('') || '<p style="text-align:center;color:#97928A;font-size:13px">아직 메시지가 없어요.</p>';
  }catch(e){}
}

/* ── RSVP 확인 + 엑셀 다운로드 ── */
const RV_TABLE = 'rsvp';
let rvRows = [];
async function loadRsvp(){
  try{
    rvRows = await fetch(SUPABASE_URL + '/rest/v1/' + RV_TABLE + '?select=name,relation,attend,headcount,created_at&order=created_at.desc&limit=1000',
      { headers: H }).then(r => r.json());
    const yes = rvRows.filter(r => r.attend), no = rvRows.filter(r => !r.attend);
    const ppl = yes.reduce((s,r) => s + (r.headcount || 1), 0);
    document.getElementById('rv-sum').textContent = rvRows.length
      ? '참석 ' + yes.length + '건 (총 ' + ppl + '명) · 불참 ' + no.length + '건'
      : '아직 회신이 없어요.';
    document.getElementById('rv-list').innerHTML = rvRows.length
      ? '<table class="rv"><tr><th>이름</th><th>관계</th><th>참석 여부</th><th>인원</th><th>회신일</th></tr>'
        + rvRows.map(r => '<tr><td>' + esc(r.name) + '</td><td>' + esc(r.relation) + '</td><td>'
          + (r.attend ? '참석' : '불참') + '</td><td>' + (r.attend ? (r.headcount || 1) + '명' : '-')
          + '</td><td>' + (r.created_at || '').slice(0,10).replace(/-/g,'.') + '</td></tr>').join('')
        + '</table>'
      : '';
  }catch(e){}
}
function downloadRsvp(){
  if(!rvRows.length){ alert('내려받을 회신이 없어요.'); return; }
  const data = rvRows.map(r => ({
    '이름': r.name, '관계': r.relation,
    '참석여부': r.attend ? '참석' : '불참',
    '인원': r.attend ? (r.headcount || 1) : '',
    '회신일': (r.created_at || '').slice(0,10)
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:12},{wch:16},{wch:10},{wch:8},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '참석여부');
  XLSX.writeFile(wb, '참석여부회신_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

load(); loadMsgs(); loadRsvp();
</script>
</body>
</html>
